project:
  name: "PGBM_actividad_1_diagnostico"
  description: "Diagnóstico regional de aptitud de fuentes y vacíos de información"
  stage: "Modulo 0 - Configuracion inicial"
  version: "0.1.0"
  author: "Equipo PGBM"

paths:
  project_root: "/media/estb/PGB_disco/PGBM_actividad_1_diagnostico"
  data_raw: "data/raw"
  data_interim: "data/interim"
  data_processed: "data/processed"
  data_external: "data/external"
  notebooks: "notebooks"
  src: "src"
  outputs_tables: "outputs/tables"
  outputs_figures: "outputs/figures"
  outputs_maps: "outputs/maps"
  outputs_reports: "outputs/reports"
  logs: "logs"
  docs: "docs"

input_data:
  gpkg_file: "data/raw/GeoPackage_puntos_control_mesoamerica.gpkg"
  gpkg_layer: "Puntos_control_mesoamerica"
  geometry_column: "geometry"

fields:
  id_primary: "Id"
  id_origin: "Id_Origen"
  source: "Fuente"
  source_id: "id_fuente"
  source_type: "Tipo"
  year: "Año"
  country: "Pais_es"
  country_code: "Pais_cod3"
  longitude: "Longitud"
  latitude: "Latitud"
  level_0: "Nivel_0"
  level_1: "Nivel_1"
  level_2: "Nivel_2"
  id_level_0: "id_0"
  id_level_1: "id_cob_niv1"
  id_level_2: "id_cob_niv2"

quality_fields:
  ndvi: "NDVI"
  canopy_cover: "Cobertura"
  canopy_height: "Altura"
  conf_ndvi: "conf_ndvi"
  conf_cover: "conf_cobertura"
  conf_height: "conf_altura"
  conf_integrated: "conf_integrada"

spatial:
  expected_crs: "EPSG:4326"
  projected_crs_analysis: null
  coordinate_precision: 6

outputs:
  overwrite: true
  save_intermediate: true


temporal:
  target_year: 2020
  near_window_years: 2
  min_plausible_year: 1980
  max_plausible_year: 2026


thematic_window:
  target_year: 2020
  near_window_years: 2
  min_records_low_class: 100
  min_records_critical_class: 30
  min_records_sufficient_country_class: 500


conflict_taxonomy:
  priority_subset: "ventana_2018_2022"
  include_exact_year_subset: true
  include_window_subset: true
  review_priority_threshold: 75
  high_priority_threshold: 60
  medium_priority_threshold: 40
  forest_keywords:
    - "forest"
    - "bosque"
    - "manglar"
  agro_keywords:
    - "cultivo"
    - "pastizal"
    - "matorral"
    - "cafe"
    - "café"
  residual_keywords:
    - "otras"
    - "otra"
  water_keywords:
    - "agua"
    - "humedal"

